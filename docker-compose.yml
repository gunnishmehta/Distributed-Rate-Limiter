services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
  
  node-app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NODE_APP_PORT=3000
      - DEFAULT_LIMIT=10
      - DEFAULT_WINDOW_SECONDS=60
    depends_on:
      - redis